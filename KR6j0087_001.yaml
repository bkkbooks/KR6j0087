body:
  text: 八戒文第一稽首請證明品弟子衆等稽首和南虛空法界無上種智乘形紀身成正覺者摩訶般若方廣一乘十地聖人三賢大士虛空幽顯主異諸神色無色天梵王眷屬護世帝釋輔翼諸官冥道曹寮焰魔羅主惟願今日以淨天眼見於衆人虔恭志誠一心奉請第二洗懺往業品弟子衆等合道場人無始時來至于今日積罪無量難測邊涯造愆纍生罕究其際於三寶所起不信心對十方尊行非梵行縱身殺害偷盜邪非縱口妄言綺語惡罵縱心貪欲瞋恚愚癡從此廣生無邊惡業循環三有沒溺四流五蓋覆心十纏迷性長居凡品解脫無期梵曰懺摩此云悔過從今已後斷相續心往昔罪愆總願消滅第三得戒三歸品弟子衆等合道場人歸依佛兩足尊歸依法離欲尊歸依僧衆中尊惟願三寶慈悲證明哀憐攝受三説弟子衆等合道場人歸依佛竟歸依法竟歸依僧竟我受八戒近住律儀願尊憶持慈悲護念三説第四問持説品諸佛子等諦聽言八戒者所謂一不殺二不盜三不染欲四不妄語五不飲酒食肉六不香油塗身及鬘花莊飾七不作倡伎樂故往觀聽八不上高大床及過中食始於今時至明清旦一日一夜隨佛出家於其中間不得犯能持否第五回向發願品弟子衆等合道場人受戒善緣盡將回向法界含生願妄執情袪愚癡障盡無分別智明了現前有相行門熾然修學華藏世界遍歷遊從如來藏心深契根本未證者證未圓者圓衆生海中總願成佛五戒文一切凡夫迷本覺性隨妄流轉居三有中遂六趣區分人天隔越佛有五戒令人奉持從方便門入實相理第一發誠稽請章弟子衆等合道場人仰啓十方虛空法界成正覺者轉法輪者般涅槃者是我等輩真善知識醫王大師攝受我故無邊法藏一味醍醐半滿圓音摩訶衍教是我良藥是我舟航於生死河濟度我故三乘聖衆八輩比丘趣寂聲聞漏悲菩薩於我等輩生憐愍心如看病人救護我故惟願三寶弘誓願力不思議力於真性內起無緣慈於今日時受我等請第二悔過先罪章弟子衆等合道場人曠劫愚迷至于今日於第一義不明了故生諸障門煩惱所知迷事迷理觸境起業隨緣造愆身起三支口犯四過意三業行轉轉逾深如沙如塵其數無量不覺身篋盛四毒蛇五旃陀羅六入空聚受詐親善衆多惡緣驅馳識心五趣循轉從此積集八萬四千人間過非無惡不造始於今日省察身心披陳佛前總願消滅第三轉邪歸敬章弟子衆等合道場人歸依佛無上尊歸依法離欲尊歸依僧衆中尊自從今日以佛為師更不歸餘邪魔外道惟願三寶慈悲證明哀憐攝受三説弟子衆等合道場人歸依佛竟歸依法竟歸依僧竟是佛婆伽婆多陀阿伽度阿羅訶三藐三佛陀是我大師我今歸依願佛攝受三説第四説相合修章佛子諦聽言優婆塞戒者所謂一不殺二不盜三不邪行四不妄語五不飲酒食肉始於今時盡未來際於其中間不得犯能持否第五回向願海章弟子衆等合道場人向來受戒回向菩提真如性海四流三有一切衆生總願發心修普賢行不斷佛種生如來家還將大悲展轉開示獲髻中寶得衣裏珠當坐道場總願成佛
